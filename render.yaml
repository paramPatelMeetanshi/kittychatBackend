services:
  - type: web
    name: kittychat
    runtime: node
    buildCommand: cd dashboard && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
